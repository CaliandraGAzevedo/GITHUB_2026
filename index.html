<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha - Sol & Lua Crescente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0b132b;
            --board-color: #1c2541;
            --text-color: #ffffff;
            --sol-color: #ffbc42;
            --lua-color: #5bc0be;
            --primary-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1c2541 0%, #0b132b 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Efeito de estrelas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, rgba(255,255,255,0.2)),
                radial-gradient(2px 2px at 60px 70px, white, rgba(255,255,255,0.2)),
                radial-gradient(1px 1px at 50px 50px, white, rgba(255,255,255,0.2)),
                radial-gradient(1px 1px at 130px 80px, white, rgba(255,255,255,0.2)),
                radial-gradient(2px 2px at 90px 10px, white, rgba(255,255,255,0.2));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 20px rgba(91, 192, 190, 0.5), 0 0 40px rgba(255, 188, 66, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            letter-spacing: 2px;
        }

        h1:hover {
            transform: scale(1.05);
            text-shadow: 0 0 30px rgba(91, 192, 190, 0.8), 0 0 60px rgba(255, 188, 66, 0.6);
        }

        h1:active {
            transform: scale(0.95);
        }

        .click-hint {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            z-index: 2;
            position: relative;
            animation: pulse-text 2s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .scoreboard {
            display: flex;
            gap: 60px;
            font-size: 1.3rem;
            margin-bottom: 20px;
            background: rgba(28, 37, 65, 0.8);
            padding: 15px 35px;
            border-radius: 50px;
            box-shadow: var(--primary-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(91, 192, 190, 0.2);
            z-index: 2;
            position: relative;
            min-width: 400px;
            justify-content: center;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .score-item:hover {
            transform: scale(1.1);
        }

        .score-sol { 
            color: var(--sol-color); 
            text-shadow: 0 0 10px var(--sol-color);
        }

        .score-lua { 
            color: var(--lua-color); 
            text-shadow: 0 0 10px var(--lua-color);
        }

        .emoji {
            font-size: 1.8rem;
            animation: emoji-bounce 1s ease-in-out infinite;
        }

        .emoji.sol-emoji {
            animation: rotate-sun 8s linear infinite;
        }

        @keyframes rotate-sun {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes emoji-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .status {
            font-size: 1.4rem;
            margin-bottom: 25px;
            height: 35px;
            font-weight: 300;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
            min-height: 40px;
            animation: fade-in 0.3s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 2;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--primary-shadow), inset 0 0 20px rgba(91, 192, 190, 0.1);
            border: 2px solid rgba(91, 192, 190, 0.3);
            backdrop-filter: blur(10px);
        }

        .cell {
            background: linear-gradient(135deg, rgba(60, 80, 107, 0.8), rgba(28, 37, 65, 0.8));
            border: 2px solid rgba(91, 192, 190, 0.3);
            border-radius: 15px;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.1), 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .cell:hover::before {
            left: 100%;
        }

        .cell:hover:not(.sol):not(.lua) {
            background: linear-gradient(135deg, rgba(91, 192, 190, 0.4), rgba(60, 80, 107, 0.8));
            transform: translateY(-5px) scale(1.02);
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.2), 0 8px 25px rgba(91, 192, 190, 0.3);
            border-color: rgba(91, 192, 190, 0.6);
        }

        .cell:active:not(.disabled) {
            transform: translateY(-2px) scale(0.98);
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        .cell.sol {
            color: var(--sol-color);
            animation: appear-sol 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 10px var(--sol-color);
        }

        .cell.lua {
            color: var(--lua-color);
            animation: appear-lua 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 10px var(--lua-color);
        }

        @keyframes appear-sol {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes appear-lua {
            from {
                transform: scale(0) rotate(180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .cell.winner-cell {
            background: linear-gradient(135deg, rgba(91, 192, 190, 0.8), rgba(255, 188, 66, 0.6));
            animation: pulse-winner 0.6s ease-in-out infinite;
            box-shadow: inset 0 1px 3px rgba(255, 255, 255, 0.3), 0 0 30px rgba(91, 192, 190, 0.8);
            border-color: rgba(91, 192, 190, 0.9);
        }

        @keyframes pulse-winner {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .buttons-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            z-index: 2;
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
        }

        .reset-btn, .clear-scores-btn, .history-btn {
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .reset-btn::before, .clear-scores-btn::before, .history-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s;
            z-index: -1;
        }

        .reset-btn:hover::before, .clear-scores-btn:hover::before, .history-btn:hover::before {
            left: 100%;
        }

        .reset-btn {
            background: linear-gradient(135deg, var(--lua-color), #3a9b96);
            color: #0b132b;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(91, 192, 190, 0.5);
        }

        .clear-scores-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .clear-scores-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
        }

        .history-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }

        .history-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        /* Modal de Histórico */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #1c2541, #0b132b);
            margin: 5% auto;
            padding: 30px;
            border: 2px solid rgba(91, 192, 190, 0.5);
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(91, 192, 190, 0.3);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: var(--lua-color);
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(91, 192, 190, 0.5);
        }

        .close-btn {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover,
        .close-btn:focus {
            color: var(--lua-color);
        }

        .history-stats {
            background: rgba(108, 92, 231, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #6c5ce7;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .history-entry {
            background: rgba(60, 80, 107, 0.4);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 4px solid var(--lua-color);
            transition: all 0.3s ease;
        }

        .history-entry:hover {
            background: rgba(60, 80, 107, 0.6);
            transform: translateX(5px);
        }

        .history-entry.winner-entry {
            border-left-color: var(--sol-color);
            background: rgba(255, 188, 66, 0.1);
        }

        .history-time {
            color: var(--lua-color);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .history-result {
            margin-top: 8px;
            font-size: 1rem;
            color: var(--text-color);
        }

        .history-moves {
            margin-top: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 5px;
            max-height: 100px;
            overflow-y: auto;
        }

        .export-btn {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: #0b132b;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
            width: 100%;
        }

        .export-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.5);
        }

        /* Easter Egg Canvas */
        #easterEggCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
        }

        /* Confetti e Estrelas */
        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 998;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .scoreboard {
                gap: 30px;
                padding: 12px 20px;
                min-width: auto;
                font-size: 1rem;
            }

            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 8px;
                padding: 15px;
            }

            .cell {
                font-size: 2.5rem;
            }

            .buttons-container {
                flex-direction: column;
                gap: 10px;
            }

            .reset-btn, .clear-scores-btn, .history-btn {
                padding: 12px 25px;
                font-size: 0.9rem;
                width: 100%;
            }

            .modal-content {
                width: 95%;
                margin: 20% auto;
            }
        }
    </style>
</head>
<body>

    <h1 id="gameTitle">Jogo da Velha</h1>
    <div class="click-hint" id="clickHint">Clique 3x no título para um easter egg! ✨</div>

    <div class="scoreboard">
        <div class="score-item">
            <span class="emoji sol-emoji">☀️</span>
            <span>Sol: <span id="solScore" class="score-sol">0</span></span>
        </div>
        <div class="score-item">
            <span class="emoji">🌙</span>
            <span>Lua: <span id="luaScore" class="score-lua">0</span></span>
        </div>
    </div>

    <div class="status" id="statusText">Sua vez (🌙)</div>

    <div class="container">
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="buttons-container">
            <button class="reset-btn" id="resetBtn">🔄 Reiniciar Partida</button>
            <button class="clear-scores-btn" id="clearScoresBtn">🗑️ Limpar Placar</button>
            <button class="history-btn" id="historyBtn">📊 Histórico (Agente Cali)</button>
        </div>
    </div>

    <!-- Modal de Histórico -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🤖 Agente Cali - Histórico de Partidas</h2>
                <span class="close-btn">&times;</span>
            </div>
            <div id="statsContainer"></div>
            <div id="historyList"></div>
            <button class="export-btn" id="exportBtn">💾 Exportar como JSON</button>
        </div>
    </div>

    <canvas id="easterEggCanvas"></canvas>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        const resetBtn = document.getElementById('resetBtn');
        const clearScoresBtn = document.getElementById('clearScoresBtn');
        const historyBtn = document.getElementById('historyBtn');
        const gameTitle = document.getElementById('gameTitle');
        const canvas = document.getElementById('easterEggCanvas');
        const ctx = canvas.getContext('2d');

        // HUMAN = jogador humano (Lua), AI = IA (Sol)
        const HUMAN = 'lua';
        const AI = 'sol';
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let isGameActive = true;
        let isAIThinking = false;
        let currentGameMoves = []; // Rastrear movimentos da partida atual
        
        let scores = { sol: 0, lua: 0 };
        let titleClicks = 0;
        let particles = [];
        let gameHistory = []; // Histórico de todas as partidas - AGENTE CALI
        let gameStartTime = Date.now();

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // ===== AGENTE CALI - SISTEMA DE MONITORAMENTO =====
        class AgenteCalibani {
            constructor() {
                this.nome = "Cali";
                this.inicializacao = new Date().toLocaleString('pt-BR');
                this.totalAcessos = 0;
                this.partidasProcessadas = 0;
            }

            registrarAcesso() {
                this.totalAcessos++;
            }

            registrarPartida(resultado, vencedor, movimentos, tempoTotal) {
                this.partidasProcessadas++;
                
                const partida = {
                    id: this.partidasProcessadas,
                    timestamp: new Date().toLocaleString('pt-BR'),
                    data: new Date().toISOString(),
                    resultado: resultado,
                    vencedor: vencedor,
                    movimentos: movimentos,
                    placares: {
                        sol: scores.sol,
                        lua: scores.lua
                    },
                    tempoPartida: tempoPartida,
                    boardFinal: [...gameState],
                    placarAntesDaPartida: {
                        sol: scores.sol - (vencedor === HUMAN ? 0 : (vencedor === AI ? 1 : 0)),
                        lua: scores.lua - (vencedor === HUMAN ? 1 : (vencedor === AI ? 0 : 0))
                    }
                };

                gameHistory.push(partida);
                localStorage.setItem('gameHistory', JSON.stringify(gameHistory));
                return partida;
            }

            obterRelatorio() {
                return {
                    agente: this.nome,
                    inicializacao: this.inicializacao,
                    totalAcessos: this.totalAcessos,
                    partidasProcessadas: this.partidasProcessadas,
                    placarTotal: scores,
                    historico: gameHistory
                };
            }
        }

        const agenteCali = new AgenteCalibani();

        // Inicializar canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Inicializar placar e histórico do LocalStorage
        if (localStorage.getItem('ticTacToeScores')) {
            scores = JSON.parse(localStorage.getItem('ticTacToeScores'));
            document.getElementById('solScore').textContent = scores.sol;
            document.getElementById('luaScore').textContent = scores.lua;
        }

        if (localStorage.getItem('gameHistory')) {
            gameHistory = JSON.parse(localStorage.getItem('gameHistory'));
            agenteCali.partidasProcessadas = gameHistory.length;
        }

        // Eventos
        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);
        clearScoresBtn.addEventListener('click', clearScores);
        historyBtn.addEventListener('click', openHistory);
        gameTitle.addEventListener('click', handleTitleClick);

        // Registrar acesso ao abrir a página
        agenteCali.registrarAcesso();

        // ===== MODAL DE HISTÓRICO =====
        function openHistory() {
            const modal = document.getElementById('historyModal');
            const historyList = document.getElementById('historyList');
            const statsContainer = document.getElementById('statsContainer');
            
            // Gerar estatísticas
            let vitoriasLua = gameHistory.filter(g => g.vencedor === 'lua').length;
            let vitoriasSOL = gameHistory.filter(g => g.vencedor === 'sol').length;
            let empates = gameHistory.filter(g => g.vencedor === 'empate').length;
            let tempoTotal = gameHistory.reduce((sum, g) => sum + g.tempoPartida, 0);
            let tempoMedio = gameHistory.length > 0 ? Math.round(tempoTotal / gameHistory.length) : 0;

            statsContainer.innerHTML = `
                <div class="history-stats">
                    <div style="font-weight: bold; color: var(--lua-color); margin-bottom: 10px;">📈 ESTATÍSTICAS GERAIS</div>
                    <div class="stat-item">
                        <span>Total de Partidas:</span>
                        <span style="color: var(--sol-color);">${gameHistory.length}</span>
                    </div>
                    <div class="stat-item">
                        <span>🌙 Vitórias Lua (Você):</span>
                        <span style="color: var(--lua-color);">${vitoriasLua}</span>
                    </div>
                    <div class="stat-item">
                        <span>☀️ Vitórias Sol (IA):</span>
                        <span style="color: var(--sol-color);">${vitoriasSOL}</span>
                    </div>
                    <div class="stat-item">
                        <span>🤝 Empates:</span>
                        <span style="color: #aaa;">${empates}</span>
                    </div>
                    <div class="stat-item">
                        <span>⏱️ Tempo Total:</span>
                        <span style="color: #aaa;">${tempoTotal}s</span>
                    </div>
                    <div class="stat-item">
                        <span>⏰ Tempo Médio/Partida:</span>
                        <span style="color: #aaa;">${tempoMedio}s</span>
                    </div>
                    <div class="stat-item">
                        <span>👆 Total de Acessos:</span>
                        <span style="color: var(--lua-color);">${agenteCali.totalAcessos}</span>
                    </div>
                </div>
            `;
            
            if (gameHistory.length === 0) {
                historyList.innerHTML = '<p style="text-align: center; color: rgba(255, 255, 255, 0.6);">Nenhuma partida registrada ainda.</p>';
            } else {
                historyList.innerHTML = gameHistory.map((game, index) => `
                    <div class="history-entry ${game.vencedor !== 'empate' ? 'winner-entry' : ''}">
                        <div class="history-time">⏰ Partida #${game.id} - ${game.timestamp}</div>
                        <div class="history-result">
                            ${game.vencedor === 'empate' 
                                ? '🤝 <strong>EMPATE</strong>' 
                                : `<strong>${game.vencedor === HUMAN ? '🌙 VOCÊ VENCEU' : '☀️ IA VENCEU'}</strong>`}
                        </div>
                        <div class="history-result">Placar: ☀️ ${game.placares.sol} x ${game.placares.lua} 🌙</div>
                        <div class="history-moves"><strong>Movimentos:</strong> ${game.movimentos.join(' → ')}</div>
                        <div class="history-moves"><strong>Tempo da Partida:</strong> ${game.tempoPartida}s</div>
                    </div>
                `).reverse().join('');
            }
            
            modal.style.display = 'block';
        }

        document.querySelector('.close-btn').addEventListener('click', function() {
            document.getElementById('historyModal').style.display = 'none';
        });

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('historyModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        });

        // Exportar histórico como JSON
        document.getElementById('exportBtn').addEventListener('click', function() {
            const relatorio = agenteCali.obterRelatorio();
            const dataStr = JSON.stringify(relatorio, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `historico_jogo_cali_${new Date().getTime()}.json`;
            link.click();
            URL.revokeObjectURL(url);
        });

        // Easter Egg - Confetes e Estrelas
        function handleTitleClick() {
            titleClicks++;
            
            if (titleClicks === 3) {
                createCelebration();
                titleClicks = 0;
            }
            
            setTimeout(() => {
                if (titleClicks > 0 && titleClicks < 3) {
                    titleClicks = 0;
                }
            }, 1500);
        }

        function createCelebration() {
            // Criar confetes
            for (let i = 0; i < 100; i++) {
                createConfetti();
            }
            
            // Criar estrelas
            for (let i = 0; i < 50; i++) {
                createStar();
            }

            // Iniciar animação
            animateParticles();
        }

        function createConfetti() {
            const confetti = {
                type: 'confetti',
                x: Math.random() * window.innerWidth,
                y: -10,
                vx: (Math.random() - 0.5) * 8,
                vy: Math.random() * 5 + 3,
                angle: Math.random() * Math.PI * 2,
                rotation: Math.random() * 0.1,
                life: 1,
                color: ['#ffbc42', '#5bc0be', '#ff6b9d', '#c44569'][Math.floor(Math.random() * 4)]
            };
            particles.push(confetti);
        }

        function createStar() {
            const star = {
                type: 'star',
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight * 0.5,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                angle: Math.random() * Math.PI * 2,
                rotation: Math.random() * 0.1,
                life: 1,
                size: Math.random() * 2 + 1
            };
            particles.push(star);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                p.x += p.vx;
                p.y += p.vy;
                if (p.type === 'confetti') p.vy += 0.12; // Gravidade para confete
                p.angle += p.rotation;
                p.life -= 0.01;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.life;
                
                if (p.type === 'star') {
                    drawStar(p);
                } else {
                    drawConfetti(p);
                }
            }

            ctx.globalAlpha = 1;

            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            }
        }

        function drawConfetti(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            ctx.fillStyle = p.color;
            ctx.fillRect(-5, -2, 10, 4);
            ctx.restore();
        }

        function drawStar(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.fillStyle = '#ffbc42';
            drawStarShape(p.size);
            ctx.restore();
        }

        function drawStarShape(size) {
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const x = Math.cos(angle) * size;
                const y = Math.sin(angle) * size;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        }

        // Clique do jogador Humano
        function handleCellClick(e) {
            agenteCali.registrarAcesso(); // Registra cada clique
            
            if (isAIThinking || !isGameActive) return;
            
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "") return;

            makeMove(clickedCellIndex, HUMAN);
            currentGameMoves.push(`Posição ${clickedCellIndex} - 🌙 Lua`);
            
            if (!checkGameOver(HUMAN)) {
                statusText.textContent = "☀️ Sol pensando...";
                isGameActive = false;
                isAIThinking = true;
                cells.forEach(cell => cell.classList.add('disabled'));
                setTimeout(aiTurn, 600);
            }
        }

        // Movimentação
        function makeMove(index, player) {
            gameState[index] = player;
            cells[index].classList.add(player);
            cells[index].textContent = player === 'sol' ? '☀️' : '🌙';
        }

        // Turno da IA com Minimax Imbatível
        function aiTurn() {
            let bestMove = minimax(gameState, AI).index;
            makeMove(bestMove, AI);
            currentGameMoves.push(`Posição ${bestMove} - ☀️ Sol`);

            isAIThinking = false;
            cells.forEach(cell => cell.classList.remove('disabled'));

            if (!checkGameOver(AI)) {
                statusText.textContent = "🌙 Sua vez";
                isGameActive = true;
            }
        }

        // Algoritmo Minimax - IA Imbatível
        function minimax(newBoard, player) {
            let availSpots = newBoard
                .map((val, idx) => val === "" ? idx : null)
                .filter(val => val !== null);

            if (checkWinScoring(newBoard, HUMAN)) return { score: -10 };
            if (checkWinScoring(newBoard, AI)) return { score: 10 };
            if (availSpots.length === 0) return { score: 0 };

            let moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                let move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === AI) {
                    let result = minimax(newBoard, HUMAN);
                    move.score = result.score;
                } else {
                    let result = minimax(newBoard, AI);
                    move.score = result.score;
                }

                newBoard[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === AI) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        // Verificar se há vitória (para scoring do Minimax)
        function checkWinScoring(boardState, player) {
            return winningConditions.some(condition => {
                return condition.every(index => boardState[index] === player);
            });
        }

        // Verificar fim do jogo
        function checkGameOver(player) {
            let gameWon = false;
            let winningCells = [];

            for (let i = 0; i < winningConditions.length; i++) {
                const condition = winningConditions[i];
                if (
                    gameState[condition[0]] === player &&
                    gameState[condition[1]] === player &&
                    gameState[condition[2]] === player
                ) {
                    gameWon = true;
                    winningCells = condition;
                    break;
                }
            }

            if (gameWon) {
                highlightWinningCells(winningCells);
                const playerName = player === 'sol' ? "☀️ Sol" : "🌙 Lua";
                statusText.textContent = `${playerName} venceu! 🎉`;
                isGameActive = false;
                
                scores[player]++;
                localStorage.setItem('ticTacToeScores', JSON.stringify(scores));
                document.getElementById('solScore').textContent = scores.sol;
                document.getElementById('luaScore').textContent = scores.lua;
                
                // Registrar partida no Agente Cali
                let tempoPartida = Math.round((Date.now() - gameStartTime) / 1000);
                let resultado = player === HUMAN ? 'vitoria_lua' : 'vitoria_sol';
                agenteCali.registrarPartida(resultado, player, currentGameMoves, tempoPartida);
                
                return true;
            }

            // Verificar empate
            if (gameState.every(cell => cell !== "")) {
                statusText.textContent = "Empate! 🤝";
                isGameActive = false;
                
                let tempoPartida = Math.round((Date.now() - gameStartTime) / 1000);
                agenteCali.registrarPartida('empate', 'empate', currentGameMoves, tempoPartida);
                
                return true;
            }

            return false;
        }

        function highlightWinningCells(winningCells) {
            winningCells.forEach(index => {
                cells[index].classList.add('winner-cell');
            });
        }

        // Reiniciar jogo
        function resetGame() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            isGameActive = true;
            isAIThinking = false;
            titleClicks = 0;
            currentGameMoves = [];
            gameStartTime = Date.now();
            
            cells.forEach(cell => {
                cell.classList.remove('sol', 'lua', 'winner-cell', 'disabled');
                cell.textContent = '';
            });

            statusText.textContent = "🌙 Sua vez";
            agenteCali.registrarAcesso();
        }

        // Limpar placar
        function clearScores() {
            if (confirm('Tem certeza que deseja limpar o placar?')) {
                scores = { sol: 0, lua: 0 };
                localStorage.removeItem('ticTacToeScores');
                document.getElementById('solScore').textContent = '0';
                document.getElementById('luaScore').textContent = '0';
                resetGame();
            }
        }
    </script>

</body>
