<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="game-title">Tetrix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="title">Tetrix</h1>
    <div class="controls">
      <label>Modo:
        <select id="mode-select">
          <option value="solo">Solo</option>
          <option value="duelo">Duelo (Humano vs IA)</option>
          <option value="dupla">Dupla (Humano + IA)</option>
        </select>
      </label>
      <button id="start-btn">Iniciar</button>
      <button id="pause-btn">Pausar</button>
      <span id="timer">Tempo: 00:00</span>
      <span id="score">Pontuação: 0</span>
    </div>
  </header>

  <main>
    <div id="boards">
      <canvas id="board-canvas" width="240" height="480"></canvas>
      <div id="side">
        <canvas id="next-canvas" width="120" height="120"></canvas>
        <div id="ai-status"></div>
      </div>
    </div>

    <div id="duel-area" class="hidden">
      <div>
        <h3>Jogador</h3>
        <canvas id="board1" width="240" height="480"></canvas>
      </div>
      <div>
        <h3>Asterix (IA)</h3>
        <canvas id="board2" width="240" height="480"></canvas>
      </div>
    </div>

    <canvas id="effect-layer" width="800" height="600" class="overlay"></canvas>
  </main>

  <footer>
    <p>Controles: ← → mover | ↑ rotacionar | ↓ soft drop | Espaço hard drop | P pausar</p>
    <p>Três cliques rápidos no título fazem chover estrelas (easter egg).</p>
  </footer>

  <script src="ai.js"></script>
  <script src="game.js"></script>
</body>
</html>
